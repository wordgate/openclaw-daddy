name: OpenclawDaddy
options:
  bundleIdPrefix: com.wordgate
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.12.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"

targets:
  OpenclawDaddy:
    type: application
    platform: macOS
    sources:
      - OpenclawDaddy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordgate.OpenclawDaddy
        PRODUCT_NAME: OpenclawDaddy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OpenclawDaddy/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: OpenclawDaddy/Entitlements/OpenclawDaddy.entitlements
    dependencies:
      - package: SwiftTerm
      - package: Yams

  OpenclawDaddyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - OpenclawDaddyTests
    dependencies:
      - target: OpenclawDaddy
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OpenclawDaddy.app/Contents/MacOS/OpenclawDaddy
